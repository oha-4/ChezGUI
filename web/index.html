<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChezGUI</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg, #1e1e1e);
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #root {
        position: absolute;
        inset: 0;
      }
      #rich {
        position: absolute;
        inset: 0;
        display: none;
        overflow: auto;
        box-sizing: border-box;
        color: var(--fg, #1d1d1f);
      }
      @media (prefers-color-scheme: dark) {
        #rich {
          --fg: #e8e8e8;
        }
      }
      #placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8a8a8a;
        font-size: 13px;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="rich"></div>
    <div id="placeholder">No file selected</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
